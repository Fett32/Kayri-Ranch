# -1 = keep cache forever. Won't grow unreasonably for a single server.
delete-unused-regions-after-days=-1
# Single-world server, leave off.
dynamic-multi-world=false
# Bobby — caches server chunks so you can render beyond the server's view distance.
# Active in multiplayer when MC render distance > server view-distance.
enabled=true
# Cap on the Render Distance slider in MC options. Requires Sodium (included).
# Raised from default 32 so players on good hardware can push further.
max-render-distance=64
# Skip block entities (chests/signs) in fake chunks — keeps frame times down.
no-block-entities=true
# Don't dim fake chunks — cosmetic, off by default, leave off.
taint-fake-chunks=false
# Keep chunks loaded briefly after they leave view (cut scenes, portals).
unload-delay-secs=60
# Singleplayer-only — 0 disables. We're a multiplayer pack.
view-distance-overwrite=0
